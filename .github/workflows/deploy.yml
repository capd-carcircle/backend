name: Backend CI/CD

on:
  push:
    branches: [main]

jobs:
  # ── 1단계: CI (빌드 & 테스트) ──────────────────────────────
  ci:
    name: CI — Install & Check
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: capd_test
          POSTGRES_USER: capd_user
          POSTGRES_PASSWORD: capd_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U capd_user -d capd_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      # ai 레포도 체크아웃 — tests/test_ai_parity.py가 ai/tools vs
      # app/services/analytics_engine.py 출력을 비교하는 정합성 하네스라서 필요.
      # 퍼블릭 레포라 별도 토큰 불필요.
      - name: Checkout ai repo (for parity tests)
        uses: actions/checkout@v4
        with:
          repository: capd-carcircle/ai
          path: ai-repo

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check (main entry point)
        run: python -m py_compile main.py

      - name: Run pytest
        env:
          TEST_DATABASE_URL: postgresql://capd_user:capd_pass@localhost:5432/capd_test
          AI_REPO_PATH: ${{ github.workspace }}/ai-repo
        run: pytest tests -v

  # ── 2단계: Docker 이미지 빌드 & Artifact Registry 푸시 ──────
  build-and-push:
    name: Build & Push Image
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/capd/backend:latest
            asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/capd/backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3단계: Cloud Run 배포 ─────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: capd-backend
          image: asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/capd/backend:latest
          region: asia-northeast3
          flags: >-
            --service-account=capd-runner@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
            --set-env-vars=DATABASE_URL=${{ secrets.DATABASE_URL }},SECRET_KEY=${{ secrets.SECRET_KEY }},AI_SERVICE_URL=${{ secrets.AI_SERVICE_URL }},ENVIRONMENT=production
            --allow-unauthenticated
            --port=8000
            --timeout=3600
