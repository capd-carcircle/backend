name: Backend CI/CD

on:
  push:
    branches: [main]

jobs:
  # ── 1단계: CI (빌드 & 테스트) ──────────────────────────────
  ci:
    name: CI — Install & Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check (main entry point)
        run: python -m py_compile main.py

  # ── 2단계: Docker 이미지 빌드 & Artifact Registry 푸시 ──────
  build-and-push:
    name: Build & Push Image
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/capd/backend:latest
            asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/capd/backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3단계: Cloud Run 배포 ─────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: capd-backend
          image: asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/capd/backend:latest
          region: asia-northeast3
          flags: >-
            --service-account=capd-runner@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:asia-northeast3:capd-db
            --set-secrets=DATABASE_URL=DATABASE_URL:latest,SECRET_KEY=SECRET_KEY:latest
            --set-env-vars=AI_SERVICE_URL=https://capd-ai-cdwaxwdxfa-du.a.run.app
            --allow-unauthenticated
            --port=8000
